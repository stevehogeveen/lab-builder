<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Codex Planner" }}</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #121a2c;
        --panel-soft: #16213a;
        --text: #e8ecff;
        --muted: #98a2b3;
        --accent: #4f7cfd;
        --ok: #3ca874;
        --warn: #c47a00;
        --bad: #cc5a5a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #19213b, var(--bg));
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.45;
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      .card {
        background: color-mix(in oklab, var(--panel) 82%, transparent);
        border: 1px solid color-mix(in oklab, var(--accent) 24%, #1f2e50);
        border-radius: 14px;
        padding: 14px;
        margin: 12px 0;
      }

      .headline {
        margin: 0;
        font-size: 1.4rem;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
      }

      .toolbar {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        border: 1px solid #2d3d63;
        background: var(--panel-soft);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        display: inline-block;
      }

      .btn:hover {
        border-color: var(--accent);
      }

      .btn.primary {
        background: #21439a;
        border-color: var(--accent);
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      }

      .small {
        color: var(--muted);
        font-size: 0.9rem;
      }

      label {
        display: block;
        margin: 10px 0 6px;
        color: #bfd0ff;
        font-weight: 600;
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #2e3f65;
        background: #0f1727;
        color: var(--text);
        padding: 10px;
      }

      textarea {
        min-height: 92px;
      }

      .muted {
        color: var(--muted);
      }

      .status {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-radius: 999px;
        padding: 3px 10px;
      }

      .status.planning {
        background: #2a3c60;
        color: #a2c2ff;
      }

      .status.in_progress {
        background: #183f4d;
        color: #6be4af;
      }

      .status.done {
        background: #173f29;
        color: #7ce4aa;
      }

      .status.blocked {
        background: #4e2a2a;
        color: #ffb8b8;
      }

      .session-title {
        font-weight: 700;
      }

      .session-list {
        list-style: none;
        padding: 0;
        margin: 12px 0 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .session-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .session-item .copy {
        flex: 1;
      }

      .session-item .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .session-areas {
        color: #c4d3ff;
        font-size: 0.92rem;
      }

      .meta-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }

      .meta-card {
        background: #101a2c;
        border: 1px solid #2e3f65;
        border-radius: 10px;
        padding: 10px;
      }

      .meta-card h4 {
        margin: 0 0 6px;
        font-size: 0.95rem;
      }

      .chat {
        border: 1px solid #2d3d63;
        border-radius: 10px;
        max-height: 340px;
        overflow: auto;
        padding: 8px;
        background: #0e1525;
      }

      .msg {
        border-top: 1px dashed #273a5d;
        padding: 8px 4px;
        font-size: 0.92rem;
      }

      .msg:first-child {
        border-top: 0;
      }

      .msg.user {
        color: #9fc0ff;
      }

      .msg.assistant {
        color: #c4f6d4;
      }

      .msg.system {
        color: #d8dce8;
        opacity: 0.8;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Codex App Planner</h1>
      <div class="small">Track planning sessions, keep git changes in plain language, and test in small steps.</div>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
