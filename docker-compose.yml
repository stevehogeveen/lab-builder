services:
  lab-builder:
    image: lab-builder:${LAB_BUILDER_VERSION:-0.1.0}
    container_name: lab-builder
    restart: unless-stopped
    ports:
      - "${LAB_BUILDER_PORT:-8000}:8000"
    environment:
      PORT: "8000"
    volumes:
      - ./config:/app/config
      - ./artifacts:/app/artifacts
      - ./media:/app/media
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
