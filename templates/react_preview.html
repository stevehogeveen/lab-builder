<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --bg: #f3f5f8;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --surface-3: #eef2f6;
            --ink: #18212f;
            --ink-2: #323c4d;
            --muted: #667085;
            --line: #d7dee8;
            --line-strong: #b9c4d0;
            --nav: #24272d;
            --nav-2: #30343b;
            --blue: #2563eb;
            --blue-soft: #eaf1ff;
            --green: #147d5a;
            --green-soft: #e8f6ef;
            --amber: #a16207;
            --amber-soft: #fff4dd;
            --red: #b42318;
            --red-soft: #fff0ed;
            --purple: #7156d9;
            --shadow: 0 16px 36px rgba(24, 33, 47, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.45;
            letter-spacing: 0;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        button,
        input,
        select {
            font: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .preview-loading {
            display: grid;
            min-height: 100vh;
            place-items: center;
            color: var(--muted);
        }

        .desktop-preview {
            display: grid;
            grid-template-columns: 268px minmax(0, 1fr);
            min-height: 100vh;
        }

        .app-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 100vh;
            padding: 18px 14px 14px;
            background: var(--nav);
            color: #f8fafc;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: auto;
        }

        .brand-block {
            padding: 4px 6px 2px;
        }

        .eyebrow {
            color: #9fb0c7;
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .brand {
            margin-top: 2px;
            font-size: 1.04rem;
            font-weight: 800;
        }

        .muted {
            margin-top: 3px;
            color: #b8c0cc;
            font-size: 0.78rem;
            line-height: 1.35;
        }

        .sidebar-kit-card {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
        }

        .sidebar-kit-top,
        .sidebar-kit-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar-kit-label {
            color: #aab3c1;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .status {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: #e5edf8;
            font-size: 0.7rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .status.ready {
            background: rgba(22, 163, 74, 0.18);
            color: #bbf7d0;
        }

        .status.blocked,
        .status.failed {
            background: rgba(245, 158, 11, 0.2);
            color: #fde68a;
        }

        .status.pending,
        .status.muted {
            background: rgba(148, 163, 184, 0.16);
            color: #cbd5e1;
        }

        .sidebar-kit-name {
            margin-top: 8px;
            overflow: hidden;
            font-size: 0.92rem;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-kit-meter {
            height: 6px;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
        }

        .sidebar-kit-meter span {
            display: block;
            width: var(--meter, 0%);
            height: 100%;
            border-radius: inherit;
            background: #38bdf8;
        }

        .sidebar-kit-meta {
            margin-top: 8px;
            color: #b8c0cc;
            font-size: 0.74rem;
            font-weight: 700;
        }

        .sidebar-utility-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .sidebar-tool-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 34px;
            padding: 7px 9px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #dce3ee;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 750;
            cursor: pointer;
        }

        .sidebar-tool-button:hover,
        .sidebar-tool-button:focus-visible {
            background: var(--nav-2);
            outline: none;
        }

        .kbd {
            min-width: 34px;
            padding: 2px 6px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 0.68rem;
            text-align: center;
        }

        .nav-group {
            display: grid;
            gap: 4px;
        }

        .nav-label {
            margin: 8px 8px 4px;
            color: #aab3c1;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .nav-link {
            display: block;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #dce3ee;
        }

        .nav-link:hover,
        .nav-link:focus-visible {
            border-color: rgba(255, 255, 255, 0.12);
            background: var(--nav-2);
            outline: none;
        }

        .nav-link-active {
            background: #f8fafc;
            color: var(--ink);
            border-color: #f8fafc;
        }

        .nav-link-shell {
            display: grid;
            grid-template-columns: 8px 24px minmax(0, 1fr);
            align-items: center;
            gap: 9px;
            min-height: 42px;
            padding: 7px 9px;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #94a3b8;
        }

        .nav-dot-ready {
            background: var(--green);
        }

        .nav-dot-progress {
            background: var(--blue);
        }

        .nav-dot-pending {
            background: var(--amber);
        }

        .nav-dot-blocked,
        .nav-dot-failed {
            background: #f97316;
        }

        .nav-dot-muted {
            background: #64748b;
        }

        .nav-icon {
            display: grid;
            width: 24px;
            height: 24px;
            place-items: center;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 0.68rem;
            font-weight: 850;
        }

        .nav-link-active .nav-icon {
            background: var(--blue-soft);
            color: var(--blue);
        }

        .icon-tone-ready {
            background: rgba(22, 163, 74, 0.18);
        }

        .icon-tone-pending {
            background: rgba(245, 158, 11, 0.18);
        }

        .icon-tone-blocked,
        .icon-tone-failed {
            background: rgba(249, 115, 22, 0.2);
        }

        .icon-tone-muted {
            background: rgba(100, 116, 139, 0.24);
            color: #cbd5e1;
        }

        .nav-link-copy {
            min-width: 0;
        }

        .nav-link-title {
            display: block;
            overflow: hidden;
            font-size: 0.86rem;
            font-weight: 780;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .nav-link-subtitle {
            display: block;
            overflow: hidden;
            color: currentColor;
            font-size: 0.7rem;
            opacity: 0.65;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .compact-view .workspace {
            padding: 18px;
        }

        .compact-view .panel,
        .compact-view .setup-card,
        .compact-view .metric-card {
            padding: 14px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
        }

        .sidebar-footer strong {
            display: block;
            margin-bottom: 4px;
            font-size: 0.86rem;
        }

        .sidebar-footer span {
            display: block;
            color: #b8c0cc;
            font-size: 0.78rem;
        }

        .workspace-shell {
            display: grid;
            grid-template-rows: 58px minmax(0, 1fr);
            min-width: 0;
        }

        .top-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 24px;
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
        }

        .top-status-left,
        .top-status-right {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .status-cluster {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--ink-2);
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }

        .dot-good {
            background: var(--green);
        }

        .dot-warn {
            background: var(--amber);
        }

        .dot-blue {
            background: var(--blue);
        }

        .workspace {
            min-width: 0;
            padding: 26px;
            overflow: auto;
        }

        .workspace-heading {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        .eyebrow {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            margin-top: 4px;
            font-size: 2rem;
            line-height: 1.12;
            letter-spacing: 0;
        }

        .heading-summary {
            max-width: 760px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .command-bar {
            display: grid;
            gap: 10px;
            margin: 0 0 18px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 8px 24px rgba(24, 33, 47, 0.05);
        }

        .command-main {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        .command-search {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            min-width: 0;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--surface);
        }

        .command-search-label {
            padding: 0 12px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 820;
            text-transform: uppercase;
        }

        .command-input {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-left: 1px solid var(--line);
            background: transparent;
            color: var(--ink);
            outline: none;
            padding: 8px 10px;
        }

        .command-actions,
        .command-results,
        .command-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .command-result {
            display: grid;
            gap: 2px;
            min-width: 220px;
            padding: 9px 11px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .command-result:hover,
        .command-result:focus-visible {
            border-color: var(--blue);
            outline: none;
        }

        .command-result-title {
            overflow: hidden;
            font-size: 0.84rem;
            font-weight: 820;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .command-result-meta,
        .command-empty,
        .command-summary {
            color: var(--muted);
            font-size: 0.78rem;
        }

        .command-summary span {
            padding: 3px 8px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface);
            font-weight: 760;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 36px;
            padding: 8px 12px;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
            font-size: 0.86rem;
            font-weight: 760;
        }

        .button:hover,
        .button:focus-visible {
            border-color: var(--blue);
            outline: none;
        }

        .button-primary {
            border-color: var(--blue);
            background: var(--blue);
            color: white;
        }

        .summary-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .strip-item {
            min-width: 0;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: 0 8px 24px rgba(24, 33, 47, 0.04);
        }

        .strip-label,
        .panel-label,
        .metric-label {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .strip-value {
            margin-top: 6px;
            color: var(--ink);
            font-size: 0.95rem;
            font-weight: 760;
        }

        .content-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.8fr);
            gap: 16px;
            align-items: start;
        }

        .primary-stack,
        .side-stack {
            display: grid;
            gap: 16px;
            min-width: 0;
        }

        .panel {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            margin-top: 3px;
            font-size: 1rem;
            font-weight: 820;
        }

        .panel-subtitle {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .panel-body {
            padding: 18px;
        }

        .live-panel {
            border-color: var(--line-strong);
        }

        .job-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }

        .job-title {
            font-size: 1.45rem;
            font-weight: 840;
            line-height: 1.15;
        }

        .job-summary {
            max-width: 760px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.94rem;
        }

        .progress-ring {
            display: grid;
            width: 112px;
            height: 112px;
            place-items: center;
            border-radius: 50%;
            background:
                conic-gradient(var(--blue) 0 68%, var(--surface-3) 68% 100%);
        }

        .progress-ring-inner {
            display: grid;
            width: 82px;
            height: 82px;
            place-items: center;
            border-radius: 50%;
            background: var(--surface);
            text-align: center;
        }

        .progress-ring-value {
            font-size: 1.35rem;
            font-weight: 850;
        }

        .progress-ring-label {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 780;
        }

        .metric-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }

        .metric {
            min-width: 0;
            padding: 13px 14px;
            border-right: 1px solid var(--line);
        }

        .metric:last-child {
            border-right: 0;
        }

        .metric-value {
            margin-top: 5px;
            overflow: hidden;
            color: var(--ink);
            font-size: 0.96rem;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .wide-progress {
            height: 10px;
            margin: 18px 0 0;
            overflow: hidden;
            border-radius: 6px;
            background: var(--surface-3);
            border: 1px solid var(--line);
        }

        .wide-progress-bar {
            width: 68%;
            height: 100%;
            background: var(--blue);
        }

        .job-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .timeline {
            display: grid;
            gap: 0;
        }

        .timeline-item {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
            padding: 14px 18px;
            border-top: 1px solid var(--line);
            cursor: pointer;
        }

        .timeline-item:first-child {
            border-top: 0;
        }

        .timeline-item:hover,
        .timeline-item:focus-visible,
        .timeline-item-selected {
            background: var(--surface-2);
            outline: none;
        }

        .timeline-marker {
            display: grid;
            width: 24px;
            height: 24px;
            place-items: center;
            border: 2px solid var(--line-strong);
            border-radius: 50%;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 850;
        }

        .timeline-done .timeline-marker {
            border-color: var(--green);
            color: var(--green);
        }

        .timeline-running .timeline-marker {
            border-color: var(--blue);
            color: var(--blue);
        }

        .timeline-warn .timeline-marker {
            border-color: var(--amber);
            color: var(--amber);
        }

        .timeline-title {
            font-size: 0.92rem;
            font-weight: 800;
        }

        .timeline-detail {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .timeline-time {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 740;
            white-space: nowrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 3px 8px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-2);
            color: var(--ink-2);
            font-size: 0.76rem;
            font-weight: 820;
            white-space: nowrap;
        }

        .pill-good {
            border-color: #b8dccb;
            background: var(--green-soft);
            color: var(--green);
        }

        .pill-blue {
            border-color: #b7cbff;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .pill-warn {
            border-color: #f5d088;
            background: var(--amber-soft);
            color: var(--amber);
        }

        .pill-red {
            border-color: #ffc5bd;
            background: var(--red-soft);
            color: var(--red);
        }

        .data-list,
        .activity-list,
        .warning-list {
            display: grid;
            gap: 0;
        }

        .data-row,
        .activity-row,
        .warning-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
            padding: 12px 0;
            border-top: 1px solid var(--line);
        }

        .data-row:first-child,
        .activity-row:first-child,
        .warning-row:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .data-name,
        .activity-title,
        .warning-title {
            min-width: 0;
            font-size: 0.88rem;
            font-weight: 790;
        }

        .data-value,
        .activity-detail,
        .warning-detail {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .next-step {
            border-color: #b7cbff;
            background: #fbfdff;
        }

        .next-step .panel-body {
            display: grid;
            gap: 12px;
        }

        .next-step-title {
            font-size: 1rem;
            font-weight: 850;
        }

        .next-step-copy {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .technical-panel {
            margin-top: 16px;
            border-color: var(--line-strong);
            box-shadow: none;
        }

        .technical-panel .panel-header {
            align-items: center;
        }

        .technical-body {
            display: none;
            grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
            gap: 16px;
            padding: 0 18px 18px;
        }

        .technical-panel-open .technical-body {
            display: grid;
        }

        .selected-stage {
            border-top: 1px solid var(--line);
            padding-top: 16px;
        }

        .log-box {
            min-height: 226px;
            max-height: 330px;
            overflow: auto;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #15181d;
            color: #dce3ee;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.78rem;
            line-height: 1.55;
            white-space: pre-wrap;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .detail-item {
            min-width: 0;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }

        .detail-value {
            margin-top: 4px;
            overflow-wrap: anywhere;
            font-size: 0.86rem;
            font-weight: 760;
        }

        .noscript-panel {
            max-width: 680px;
            margin: 40px auto;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--ink);
        }

        .page-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
            gap: 16px;
            align-items: start;
        }

        .page-main {
            display: grid;
            gap: 16px;
            min-width: 0;
        }

        .context-panel {
            position: sticky;
            top: 18px;
            display: grid;
            gap: 16px;
            min-width: 0;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .dashboard-lower-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
            gap: 16px;
            align-items: start;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .module-card,
        .setup-card {
            min-width: 0;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .global-settings-form {
            display: grid;
            gap: 16px;
            min-width: 0;
        }

        .toggle-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .toggle-field {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: flex-start;
            min-width: 0;
            min-height: 58px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-2);
            cursor: pointer;
        }

        .toggle-field input {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            accent-color: var(--blue);
        }

        .toggle-field strong {
            display: block;
            font-size: 0.86rem;
            font-weight: 820;
        }

        .toggle-field small {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        .snmp-user-list {
            display: grid;
            gap: 12px;
        }

        .snmp-user-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-2);
        }

        .compact-header {
            padding: 12px 14px;
            background: var(--surface);
        }

        .snmp-user-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 14px;
        }

        .field {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .field label {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .text-input,
        .select-input {
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            background: var(--surface);
            color: var(--ink);
            outline: none;
        }

        .text-input:focus,
        .select-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .text-input:-webkit-autofill,
        .text-input:-webkit-autofill:hover,
        .text-input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--ink);
            box-shadow: 0 0 0 1000px var(--surface) inset, 0 0 0 3px rgba(37, 99, 235, 0.12);
            transition: background-color 9999s ease-out;
        }

        .field-help {
            color: var(--muted);
            font-size: 0.78rem;
        }

        .message {
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--ink-2);
            font-size: 0.88rem;
            font-weight: 730;
        }

        .message-good {
            border-color: #b8dccb;
            background: var(--green-soft);
            color: var(--green);
        }

        .message-info {
            border-color: #b9d4f6;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .message-warn {
            border-color: #f5d088;
            background: var(--amber-soft);
            color: var(--amber);
        }

        .message-error {
            border-color: #ffc5bd;
            background: var(--red-soft);
            color: var(--red);
        }

        .status-step-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .status-step {
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            padding: 10px 0;
            border-top: 1px solid var(--line);
        }

        .status-step:first-child {
            border-top: 0;
        }

        .status-icon {
            display: grid;
            width: 22px;
            height: 22px;
            place-items: center;
            border-radius: 50%;
            border: 1px solid var(--line-strong);
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 900;
        }

        .status-step-good .status-icon {
            border-color: #b8dccb;
            color: var(--green);
            background: var(--green-soft);
        }

        .status-step-warn .status-icon {
            border-color: #f5d088;
            color: var(--amber);
            background: var(--amber-soft);
        }

        .status-step-error .status-icon {
            border-color: #ffc5bd;
            color: var(--red);
            background: var(--red-soft);
        }

        .status-step-title {
            color: var(--ink);
            font-size: 0.9rem;
            font-weight: 830;
        }

        .status-step-detail {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.42;
        }

        .action-list {
            display: grid;
            gap: 8px;
        }

        .action-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid var(--line);
        }

        .action-row:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .action-row-controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-width: 0;
        }

        .action-row-controls form {
            margin: 0;
        }

        .coverage-strip {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }

        .coverage-item {
            min-width: 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface-2);
        }

        .coverage-value {
            margin-top: 4px;
            font-size: 1.25rem;
            font-weight: 860;
        }

        .catalog-tools {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 260px);
            gap: 10px;
            margin-bottom: 14px;
        }

        .route-table {
            display: grid;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }

        .route-row {
            display: grid;
            grid-template-columns: minmax(260px, 1.5fr) minmax(120px, 0.7fr) minmax(100px, 0.5fr) minmax(150px, 0.8fr);
            gap: 12px;
            align-items: center;
            padding: 10px 12px;
            border-top: 1px solid var(--line);
            background: var(--surface);
            font-size: 0.82rem;
        }

        .route-row:first-child {
            border-top: 0;
        }

        .route-row-head {
            background: var(--surface-2);
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 840;
            text-transform: uppercase;
        }

        .route-path {
            overflow-wrap: anywhere;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.8rem;
            font-weight: 760;
        }

        .route-name {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        .catalog-note,
        .config-data-list {
            margin-top: 14px;
        }

        .kit-list {
            display: grid;
            gap: 0;
        }

        .kit-management-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .kit-tool-card {
            display: grid;
            align-content: start;
            gap: 10px;
        }

        .dashboard-kit-management-grid {
            margin-top: 14px;
        }

        .kit-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 11px 0;
            border-top: 1px solid var(--line);
        }

        .kit-row:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .code-mini {
            overflow: auto;
            max-height: 420px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #15181d;
            color: #dce3ee;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.78rem;
            line-height: 1.55;
            white-space: pre-wrap;
        }

        .config-preview {
            max-height: 520px;
        }

        .file-input {
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            background: var(--surface);
            color: var(--ink);
        }

        .technical-drawer {
            margin-top: 16px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: var(--surface);
        }

        .technical-drawer-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 16px;
            padding: 18px;
            border-top: 1px solid var(--line);
        }

        .empty-state {
            padding: 18px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--muted);
        }

        @media (max-width: 1180px) {
            .desktop-preview {
                grid-template-columns: 228px minmax(0, 1fr);
            }

            .content-grid {
                grid-template-columns: minmax(0, 1fr);
            }

            .command-main,
            .dashboard-lower-grid,
            .catalog-tools {
                grid-template-columns: 1fr;
            }

            .side-stack {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .coverage-strip {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .route-row {
                grid-template-columns: minmax(0, 1fr);
            }

            .next-step {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 860px) {
            .desktop-preview {
                grid-template-columns: 1fr;
            }

            .app-sidebar {
                min-height: auto;
            }

            .workspace-shell {
                grid-template-rows: auto minmax(0, 1fr);
            }

            .top-status,
            .workspace-heading,
            .job-hero {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-status {
                padding: 14px 18px;
            }

            .top-status-left,
            .top-status-right,
            .toolbar {
                flex-wrap: wrap;
                justify-content: flex-start;
            }

            .workspace {
                padding: 18px;
            }

            .summary-strip,
            .metric-row,
            .side-stack,
            .page-layout,
            .section-grid,
            .module-grid,
            .form-grid,
            .kit-management-grid,
            .toggle-grid,
            .snmp-user-grid,
            .coverage-strip,
            .technical-drawer-body,
            .technical-body {
                grid-template-columns: 1fr;
            }

            .metric {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .metric:last-child {
                border-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <noscript>
        <div class="noscript-panel">
            JavaScript is required for the Lab Builder desktop UI.
        </div>
    </noscript>
    <div id="lab-builder-react-root">
        <div class="preview-loading">Loading Lab Builder...</div>
    </div>

    <script>
        window.LAB_BUILDER_REACT = {
            currentKit: {{ current_kit|tojson }},
            version: {{ app_version|tojson }}
        };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="/static/js/react-desktop-ui.js?v={{ react_asset_version }}"></script>
</body>
</html>
