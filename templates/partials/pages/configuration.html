<section class="panel space-y-6">
    <div>
        <h2 class="text-2xl font-bold">Global Settings</h2>
        <div class="text-sm text-slate-400">Save the shared defaults here once. The other setup pages can reuse them automatically.</div>
    </div>

    <form hx-post="/save-global-settings" hx-target="#main-content" hx-swap="outerHTML" class="space-y-4">
        <input type="hidden" name="return_page" value="global_settings">

        <section class="card">
            <div class="text-lg font-semibold mb-3">Shared basics</div>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">Kit name</label>
                    <input type="text" name="site_name" value="{{ cfg.get('site', {}).get('name', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">Network range</label>
                    <input type="text" name="shared_subnet" value="{{ cfg.get('shared_network', {}).get('subnet', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">Gateway</label>
                    <input type="text" name="gateway_ip" value="{{ cfg.get('ip_plan', {}).get('gateway', '') }}" class="input">
                </div>
            </div>
        </section>

        <section class="card">
            <div class="text-lg font-semibold mb-3">Default addresses</div>
            <div class="text-sm text-slate-400 mb-3">The setup pages will use these by default unless you change them on that page.</div>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">iLO address</label>
                    <input type="text" name="ilo_target_ip" value="{{ cfg.get('ip_plan', {}).get('ilo', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">ESXi address</label>
                    <input type="text" name="esxi_ip" value="{{ cfg.get('ip_plan', {}).get('esxi', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">Windows address</label>
                    <input type="text" name="windows_ip" value="{{ cfg.get('ip_plan', {}).get('windows', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">QNAP address</label>
                    <input type="text" name="qnap_ip" value="{{ cfg.get('ip_plan', {}).get('qnap', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">ioSafe address</label>
                    <input type="text" name="iosafe_ip" value="{{ cfg.get('ip_plan', {}).get('iosafe', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">Switch address</label>
                    <input type="text" name="switch_ip" value="{{ cfg.get('ip_plan', {}).get('switch', '') }}" class="input">
                </div>
            </div>
        </section>

        <section class="card">
            <div class="text-lg font-semibold mb-3">Shared DNS and alerts</div>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">DNS 1</label>
                    <input type="text" name="dns1" value="{{ cfg.get('shared_network', {}).get('dns_servers', ['', '', '', ''])[0] }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">DNS 2</label>
                    <input type="text" name="dns2" value="{{ cfg.get('shared_network', {}).get('dns_servers', ['', '', '', ''])[1] }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">DNS 3</label>
                    <input type="text" name="dns3" value="{{ cfg.get('shared_network', {}).get('dns_servers', ['', '', '', ''])[2] }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">DNS 4</label>
                    <input type="text" name="dns4" value="{{ cfg.get('shared_network', {}).get('dns_servers', ['', '', '', ''])[3] }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">SNMP user</label>
                    <input type="text" name="snmp_v3_username" value="{{ cfg.get('shared_snmp', {}).get('v3_username', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">SNMP auth type</label>
                    <select name="snmp_v3_auth_protocol" class="input">
                        <option value="SHA" {% if cfg.get('shared_snmp', {}).get('v3_auth_protocol', 'SHA') == 'SHA' %}selected{% endif %}>SHA</option>
                        <option value="MD5" {% if cfg.get('shared_snmp', {}).get('v3_auth_protocol', 'SHA') == 'MD5' %}selected{% endif %}>MD5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">SNMP auth password</label>
                    <input type="password" name="snmp_v3_auth_password" value="{{ cfg.get('shared_snmp', {}).get('v3_auth_password', '') }}" class="input">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">SNMP privacy type</label>
                    <select name="snmp_v3_priv_protocol" class="input">
                        <option value="AES" {% if cfg.get('shared_snmp', {}).get('v3_priv_protocol', 'AES') == 'AES' %}selected{% endif %}>AES</option>
                        <option value="DES" {% if cfg.get('shared_snmp', {}).get('v3_priv_protocol', 'AES') == 'DES' %}selected{% endif %}>DES</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-2">SNMP privacy password</label>
                    <input type="password" name="snmp_v3_priv_password" value="{{ cfg.get('shared_snmp', {}).get('v3_priv_password', '') }}" class="input">
                </div>
            </div>
        </section>

        <section class="card">
            <div class="text-lg font-semibold mb-3">Turn pages on for this kit</div>
            <div class="checks space-y-2">
                <label class="check"><input type="checkbox" name="included_ilo" {% if cfg.get('included', {}).get('ilo') %}checked{% endif %}> iLO setup</label>
                <label class="check"><input type="checkbox" name="included_esxi" {% if cfg.get('included', {}).get('esxi') %}checked{% endif %}> ESXi setup</label>
                <label class="check"><input type="checkbox" name="included_windows" {% if cfg.get('included', {}).get('windows') %}checked{% endif %}> Windows setup</label>
                <label class="check"><input type="checkbox" name="included_qnap" {% if cfg.get('included', {}).get('qnap') %}checked{% endif %}> QNAP setup</label>
                <label class="check"><input type="checkbox" name="included_iosafe" {% if cfg.get('included', {}).get('iosafe') %}checked{% endif %}> ioSafe setup</label>
                <label class="check"><input type="checkbox" name="included_cisco_switch" {% if cfg.get('included', {}).get('cisco_switch') %}checked{% endif %}> Cisco switch setup</label>
                <label class="check"><input type="checkbox" name="included_storage" {% if cfg.get('included', {}).get('storage') %}checked{% endif %}> Storage setup</label>
            </div>
        </section>

        <div class="actions">
            <button class="btn btn-primary action-button" type="submit">Save shared defaults</button>
            <button class="btn" hx-post="/autofill-ip-plan" hx-vals='{"return_page":"global_settings"}' hx-target="#main-content" hx-swap="outerHTML" type="button">Fill in default addresses</button>
            <a class="btn" href="/configs">Open reports & technical details</a>
        </div>
    </form>
</section>
