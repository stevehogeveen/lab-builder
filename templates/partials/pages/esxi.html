<section class="panel space-y-6">
    <div>
        <h2 class="text-2xl font-bold">ESXi setup</h2>
        <div class="text-sm text-slate-400">Use this page to save the ESXi name and password for this kit.</div>
    </div>

    <section class="card">
        <div class="text-lg font-semibold mb-3">What this page will use</div>
        <div class="text-sm">The server address, gateway, and DNS come from Global Settings unless you change them there first.</div>
        <div class="actions mt-4">
            <a class="btn" href="/global-settings">Open global settings</a>
        </div>
    </section>

    <section class="card">
        <div class="text-lg font-semibold mb-3">ESXi details</div>
        <form hx-post="/save-esxi-settings" hx-target="#main-content" hx-swap="outerHTML" class="space-y-4">
            <input type="hidden" name="return_page" value="esxi">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">Server name</label>
                <input type="text" name="esxi_hostname" value="{{ cfg.get('esxi', {}).get('hostname', '') }}" class="input">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">Root password</label>
                <input type="password" name="esxi_root_password" value="{{ cfg.get('esxi', {}).get('root_password', '') }}" class="input">
            </div>
            <label class="check"><input type="checkbox" name="included_esxi" {% if cfg.get('included', {}).get('esxi') %}checked{% endif %}> Include ESXi setup in this kit</label>
            <div class="actions">
                <button class="btn btn-primary action-button" type="submit">Save ESXi setup</button>
                <a class="btn" href="/execution">Open Run Center</a>
            </div>
        </form>
    </section>
</section>
