<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/gridstack.min.css">

    <style>
        :root {
            --bg: #f7f9fc;
            --bg-soft: #f1f5fa;
            --panel: rgba(255, 255, 255, 0.985);
            --panel2: #fbfcfe;
            --panel3: #f4f7fb;
            --border: #dde5ef;
            --border-strong: #c9d5e2;
            --text: #162333;
            --muted: #64758c;
            --muted-soft: #8594a7;
            --accent: #2f6fdb;
            --accent-soft: #edf4ff;
            --good: #337c5b;
            --good-soft: #eef8f3;
            --warn: #a66c21;
            --warn-soft: #fff7ea;
            --bad: #c2665d;
            --bad-soft: #fff4f2;
            --sidebar: rgba(255, 255, 255, 0.9);
            --hero-bg: rgba(255, 255, 255, 0.99);
            --card-shadow: 0 12px 30px rgba(28, 49, 77, 0.06);
            --card-shadow-hover: 0 18px 40px rgba(28, 49, 77, 0.1);
            --panel-glow: rgba(47, 111, 219, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top, color-mix(in srgb, var(--accent) 5%, white 95%) 0%, transparent 24%),
                linear-gradient(180deg, color-mix(in srgb, var(--bg) 98%, white 2%) 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Inter", "Segoe UI", "Helvetica Neue", sans-serif;
            line-height: 1.55;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 268px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 22px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            backdrop-filter: blur(14px);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        .brand-block {
            margin-bottom: 22px;
        }

        .eyebrow {
            color: var(--accent);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: .14em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .nav-group {
            margin-bottom: 16px;
        }

        .nav-label {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 8px;
        }

        .nav-link {
            display: block;
            text-decoration: none;
            color: var(--text);
            background: color-mix(in srgb, var(--panel2) 72%, transparent);
            border: 1px solid color-mix(in srgb, var(--border) 90%, transparent);
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-weight: 600;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .nav-link:hover {
            background: color-mix(in srgb, var(--accent-soft) 55%, var(--panel) 45%);
            border-color: color-mix(in srgb, var(--accent) 18%, var(--border));
            transform: translateX(1px);
            box-shadow: 0 8px 20px rgba(42, 103, 209, 0.06);
        }

        .nav-link-active {
            background: color-mix(in srgb, var(--accent-soft) 82%, white 18%);
            border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
            color: color-mix(in srgb, var(--text) 82%, var(--accent) 18%);
        }

        .main {
            padding: 28px;
        }

        .hero {
            background: var(--hero-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, color-mix(in srgb, var(--accent) 6%, white 94%), transparent 45%);
            pointer-events: none;
        }

        .panel, .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--card-shadow);
        }

        .panel { padding: 20px; }
        .card { padding: 16px; height: 100%; }
        .panel, .card, .main, #main-content { min-width: 0; }

        a.card {
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        a.card:hover {
            transform: translateY(-2px);
            border-color: color-mix(in srgb, var(--accent) 22%, var(--border));
            box-shadow: var(--card-shadow-hover);
        }

        .muted { color: var(--muted); }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: bold;
            font-size: .8rem;
            border: 1px solid transparent;
            letter-spacing: 0.01em;
        }

        .ready { color: var(--good); background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 18%, var(--border)); }
        .progress { color: var(--accent); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 18%, var(--border)); }
        .pending { color: var(--warn); background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 18%, var(--border)); }

        .live-inventory-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid color-mix(in srgb, var(--accent) 24%, var(--border));
            border-top-color: var(--accent);
            border-radius: 999px;
            display: inline-block;
            animation: live-inventory-spin 0.8s linear infinite;
            flex: 0 0 auto;
        }

        .live-inventory-spinner.hidden {
            display: none;
        }

        @keyframes live-inventory-spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            background: linear-gradient(180deg, color-mix(in srgb, white 74%, var(--panel2) 26%), color-mix(in srgb, white 50%, var(--panel2) 50%));
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 11px 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(31, 54, 84, 0.05);
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .input-invalid {
            border-color: color-mix(in srgb, var(--bad) 42%, var(--border-strong));
            background: color-mix(in srgb, var(--bad-soft) 58%, white 42%);
            box-shadow: 0 0 0 3px rgba(194, 102, 93, 0.12);
        }

        .field-error {
            background: linear-gradient(180deg, color-mix(in srgb, var(--bad-soft) 78%, white 22%), color-mix(in srgb, var(--bad-soft) 92%, white 8%));
            border: 1px solid color-mix(in srgb, var(--bad) 18%, var(--border));
            border-radius: 12px;
            padding: 10px 12px;
            color: var(--bad);
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .field-error + .input,
        .field-error + select.input {
            margin-top: 0;
        }

        .btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(42, 103, 209, 0.1);
        }

        .btn-primary,
        button[type="submit"],
        input[type="submit"] {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 82%, white 18%), var(--accent));
            color: white;
            border-color: color-mix(in srgb, var(--accent) 72%, black 28%);
            box-shadow: 0 12px 24px rgba(42, 103, 209, 0.16);
        }

        .btn-primary:hover,
        button[type="submit"]:hover,
        input[type="submit"]:hover {
            border-color: color-mix(in srgb, var(--accent) 56%, black 44%);
            box-shadow: 0 14px 28px rgba(42, 103, 209, 0.22);
        }

        .btn-danger {
            background: linear-gradient(180deg, color-mix(in srgb, var(--bad) 10%, white 90%), color-mix(in srgb, var(--bad-soft) 78%, white 22%));
            color: color-mix(in srgb, var(--bad) 78%, black 22%);
            border-color: color-mix(in srgb, var(--bad) 30%, var(--border));
            box-shadow: 0 8px 18px rgba(194, 90, 82, 0.08);
        }

        .action-button {
            min-height: 44px;
            font-weight: 700;
        }

        .action-card {
            border-color: color-mix(in srgb, var(--border) 82%, var(--accent));
            background: linear-gradient(180deg, color-mix(in srgb, white 92%, var(--panel2) 8%), var(--panel));
        }

        .action-card-primary {
            border-color: color-mix(in srgb, var(--accent) 24%, var(--border));
            box-shadow: 0 14px 30px rgba(42, 103, 209, 0.08);
        }

        .dashboard-hero-card {
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 16%, white 84%) 0%, transparent 34%),
                linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 56%, white 44%), white 72%);
            border-color: color-mix(in srgb, var(--accent) 26%, var(--border));
            box-shadow: 0 18px 40px rgba(42, 103, 209, 0.12);
        }

        .dashboard-hero-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .dashboard-hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
            gap: 18px;
            align-items: start;
        }

        .dashboard-kicker {
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .dashboard-active-kit-name {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.02;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .dashboard-next-step,
        .dashboard-form-card,
        .dashboard-metric,
        .dashboard-status-item,
        .dashboard-empty-state {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: color-mix(in srgb, white 86%, var(--panel2) 14%);
            padding: 16px;
        }

        .dashboard-metric-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .dashboard-metric-value {
            font-size: 1.8rem;
            line-height: 1;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .dashboard-status-list {
            display: grid;
            gap: 12px;
        }

        .dashboard-status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .dashboard-status-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dashboard-identity-banner,
        .dashboard-receipt-card {
            border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--border));
            border-radius: 18px;
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 8%, white 92%) 0%, transparent 40%),
                linear-gradient(180deg, color-mix(in srgb, white 92%, var(--panel2) 8%), white);
            padding: 18px;
        }

        .dashboard-identity-banner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .dashboard-identity-title {
            font-size: 1.4rem;
            line-height: 1.1;
            font-weight: 800;
        }

        .dashboard-identity-grid,
        .dashboard-receipt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .dashboard-identity-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: color-mix(in srgb, white 84%, var(--panel2) 16%);
            padding: 14px;
        }

        .dashboard-timeline {
            position: relative;
            display: grid;
            gap: 14px;
        }

        .dashboard-timeline::before {
            content: "";
            position: absolute;
            left: 11px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 28%, var(--border)), color-mix(in srgb, var(--border) 72%, transparent));
        }

        .dashboard-timeline-item {
            position: relative;
            display: grid;
            grid-template-columns: 24px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .dashboard-timeline-marker {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            border: 4px solid white;
            box-shadow: 0 0 0 1px var(--border);
            position: relative;
            z-index: 1;
        }

        .dashboard-timeline-marker-ready {
            background: var(--good);
        }

        .dashboard-timeline-marker-progress {
            background: var(--accent);
        }

        .dashboard-timeline-marker-pending {
            background: var(--warn);
        }

        .dashboard-timeline-body {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: color-mix(in srgb, white 88%, var(--panel2) 12%);
            padding: 15px 16px;
        }

        .dashboard-timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .dashboard-timeline-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
            font-size: 0.84rem;
            color: var(--muted);
        }

        .dashboard-timeline-meta a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .receipt-banner {
            border-color: color-mix(in srgb, var(--accent) 22%, var(--border));
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 8%, white 92%) 0%, transparent 34%),
                linear-gradient(180deg, color-mix(in srgb, white 94%, var(--panel2) 6%), white);
        }

        .receipt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .dashboard-status-item-good {
            border-color: color-mix(in srgb, var(--good) 18%, var(--border));
            background: linear-gradient(180deg, color-mix(in srgb, var(--good-soft) 75%, white 25%), white);
        }

        .dashboard-status-item-warn {
            border-color: color-mix(in srgb, var(--warn) 18%, var(--border));
            background: linear-gradient(180deg, color-mix(in srgb, var(--warn-soft) 78%, white 22%), white);
        }

        .dashboard-step-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .dashboard-step-card {
            background:
                linear-gradient(180deg, color-mix(in srgb, white 94%, var(--panel2) 6%), white),
                white;
            border-color: color-mix(in srgb, var(--border) 82%, var(--accent));
        }

        .dashboard-step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .dashboard-step-number {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: color-mix(in srgb, var(--accent-soft) 80%, white 20%);
            color: color-mix(in srgb, var(--accent) 75%, black 25%);
            border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--border));
        }

        .dashboard-step-link {
            margin-top: 16px;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--accent);
        }

        .card-compact {
            padding: 16px;
        }

        .stage-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .execution-layout,
        .execution-layout > *,
        .execution-summary-card,
        .execution-section-card,
        .execution-stage-card,
        .execution-matrix-item {
            min-height: 0;
        }

        .execution-layout {
            align-items: start;
        }

        .execution-summary-card,
        .execution-section-card,
        .execution-stage-card {
            height: auto;
        }

        .execution-matrix-item {
            padding: 14px 16px;
        }

        .execution-live-card {
            padding: 22px;
            border-color: color-mix(in srgb, var(--accent) 24%, var(--border));
            box-shadow: 0 18px 36px rgba(4, 10, 18, 0.24);
        }

        .execution-live-summary {
            background: color-mix(in srgb, var(--panel2) 86%, transparent);
            border-color: color-mix(in srgb, var(--border-strong) 82%, transparent);
        }

        .execution-live-log .codeblock {
            min-height: 220px;
        }

        .execution-controls-card {
            background: color-mix(in srgb, var(--panel) 94%, transparent);
        }

        .execution-story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .execution-story-card,
        .execution-change-card,
        .execution-confidence-card {
            border: 1px solid color-mix(in srgb, var(--accent) 16%, var(--border));
            border-radius: 16px;
            background: color-mix(in srgb, white 88%, var(--panel2) 12%);
            padding: 16px;
        }

        .execution-confidence-card {
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 8%, white 92%) 0%, transparent 36%),
                linear-gradient(180deg, color-mix(in srgb, white 94%, var(--panel2) 6%), white);
        }

        .stage-link {
            width: 100%;
            justify-content: center;
        }

        .soft-warning {
            border-color: color-mix(in srgb, var(--bad) 34%, var(--border));
            background: color-mix(in srgb, var(--bad) 6%, transparent);
        }

        .execute-confirm {
            border-color: color-mix(in srgb, var(--bad) 22%, var(--border));
        }

        .btn:disabled,
        button:disabled,
        input:disabled,
        select:disabled,
        textarea:disabled {
            cursor: not-allowed;
            opacity: 0.62;
            box-shadow: none;
            transform: none;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="search"],
        input[type="email"],
        select,
        textarea {
            background: color-mix(in srgb, white 88%, var(--panel2) 12%);
            color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 12px 13px;
            width: 100%;
            box-shadow: inset 0 1px 2px rgba(24, 37, 53, 0.03);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--muted-soft);
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: color-mix(in srgb, var(--accent) 44%, var(--border));
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .msg, .result, .error, .codeblock {
            margin-top: 14px;
            padding: 13px 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .msg { background: color-mix(in srgb, var(--good) 8%, var(--panel)); color: var(--text); }
        .result { background: color-mix(in srgb, var(--accent) 7%, var(--panel)); color: var(--text); }
        .error { background: color-mix(in srgb, var(--bad) 10%, var(--panel)); color: var(--text); border-color: color-mix(in srgb, var(--bad) 35%, var(--border)); }

        .workflow-tabs {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 18px;
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 48%, white 52%), color-mix(in srgb, var(--panel2) 84%, white 16%));
            border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
        }

        .workflow-tab {
            min-width: 132px;
            justify-content: center;
            border-radius: 14px;
            border-color: transparent;
            background: transparent;
            box-shadow: none;
            color: var(--muted);
            font-weight: 700;
        }

        .workflow-tab:hover {
            color: var(--text);
            border-color: color-mix(in srgb, var(--accent) 12%, transparent);
            box-shadow: none;
        }

        .workflow-tab-active {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 82%, white 18%), var(--accent));
            color: white;
            border-color: color-mix(in srgb, var(--accent) 66%, black 34%);
            box-shadow: 0 10px 22px rgba(42, 103, 209, 0.2);
        }

        .ilo-advanced-shell {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 10%, white 90%) 0%, transparent 34%),
                linear-gradient(180deg, color-mix(in srgb, white 94%, var(--accent-soft) 6%), var(--panel));
            border-color: color-mix(in srgb, var(--accent) 18%, var(--border));
        }

        .ilo-advanced-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255,255,255,0.52), transparent 42%);
        }

        .ilo-advanced-grid {
            position: relative;
            z-index: 1;
        }

        .ilo-advanced-summary {
            background: linear-gradient(180deg, color-mix(in srgb, white 80%, var(--accent-soft) 20%), color-mix(in srgb, var(--accent-soft) 52%, white 48%));
            border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
            border-radius: 16px;
            padding: 14px 16px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
        }

        .ilo-capability-card {
            background: linear-gradient(180deg, color-mix(in srgb, white 95%, var(--panel2) 5%), var(--panel));
            border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--border));
            border-radius: 18px;
            box-shadow: 0 16px 34px rgba(28, 49, 77, 0.07);
        }

        .ilo-capability-card .result {
            margin-top: 0;

<body data-active-page="{{ active_page }}">
<div class="app-shell">
    {% include "partials/sidebar.html" %}

                <h1 class="text-3xl font-bold mb-2">{{ title }}</h1>

                    <div class="hero-stat-value">{{ current_kit }}</div>
                </div>
            </div>
            {% endif %}
        </section>

        {% include "partials/main_content.html" %}
    </main>
</div>

<script src="/static/js/htmx.min.js"></script>
<script src="/static/js/alpine.min.js"></script>
<script src="/static/js/gridstack-all.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/live-inventory-status.js"></script>

<script>
(function () {
    function showGlobalWarning(message) {
        let shell = document.getElementById("htmx-global-warning");
        if (!shell) {
            shell = document.createElement("div");
            shell.id = "htmx-global-warning";
            shell.className = "global-warning-popup htmx-global-warning";
            shell.setAttribute("role", "alert");
            shell.setAttribute("aria-live", "assertive");
            shell.innerHTML = '<div class="warning-icon">!</div><div><div class="text-lg font-semibold">Warning: action failed</div><div class="text-sm" data-warning-message></div></div>';
            document.body.appendChild(shell);
        }
        const target = shell.querySelector("[data-warning-message]");
        if (target) target.textContent = message;
        shell.style.display = "flex";
        shell.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    document.body.addEventListener("htmx:responseError", function (event) {
        const xhr = event.detail && event.detail.xhr;
        const status = xhr ? xhr.status : "unknown";
        let message = "The app could not finish that action.";
        if (xhr && xhr.responseText) {
            const text = xhr.responseText.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
            if (text) message = text.slice(0, 500);
        }
        showGlobalWarning(`HTTP ${status}: ${message}`);
    });

    document.body.addEventListener("htmx:sendError", function () {
        showGlobalWarning("The app could not send the request. Check that the server is still running.");
    });

    const kitName = {{ current_kit|tojson }};
    const proto = window.location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${proto}://${window.location.host}/ws/job/${encodeURIComponent(kitName)}`;
    const ws = new WebSocket(wsUrl);

    ws.onmessage = function (event) {
        const text = event.data;
        const lines = text.split("\n");
        let data = {};
        let currentKey = null;

        for (const rawLine of lines) {
            const line = rawLine.replace(/\r$/, "");
            if (!line.trim()) continue;

            if (line.startsWith("  - ")) {
                if (currentKey && Array.isArray(data[currentKey])) {
                    data[currentKey].push(line.replace(/^  - /, ""));
                }
                continue;
            }

            const idx = line.indexOf(":");
            if (idx > -1) {
                const key = line.slice(0, idx).trim();
                let value = line.slice(idx + 1).trim();
                if (value === "") {
                    data[key] = [];
                } else {
                    value = value.replace(/^["']|["']$/g, "");
                    if (/^\d+$/.test(value)) value = parseInt(value, 10);
                    data[key] = value;
                }
                currentKey = key;
            }
        }

        const status = document.getElementById("job-status");
        const scope = document.getElementById("job-scope");
        const mode = document.getElementById("job-mode");
        const modeSummary = document.getElementById("job-mode-summary");
        const stage = document.getElementById("job-stage");
        const completed = document.getElementById("job-completed");
        const progressText = document.getElementById("job-progress-text");
        const progressBar = document.getElementById("job-progress-bar");
        const logs = document.getElementById("job-logs");

        if (status) status.textContent = "Status: " + (data.status || "Idle");
        if (scope) scope.textContent = data.scope || "";
        if (mode) mode.textContent = data.execution_mode_label || "Not running";
        if (modeSummary) {
            modeSummary.textContent = data.execution_mode === "preview"
                ? "Preview only. No real changes are being made."
                : data.execution_mode === "real"
                    ? "Real execution is running. Changes may be made."
                    : "Choose a review above to see whether the next run is preview-only or real.";
        }
        if (stage) stage.textContent = data.current_stage || "";
        if (completed) completed.textContent = `${data.completed_steps || 0} / ${data.total_steps || 0}`;
        if (progressText) progressText.textContent = `${data.progress_percent || 0}%`;
        if (progressBar) progressBar.style.width = `${data.progress_percent || 0}%`;
        if (logs && Array.isArray(data.logs)) logs.textContent = data.logs.join("\n");
    };
})();
</script>
</body>
