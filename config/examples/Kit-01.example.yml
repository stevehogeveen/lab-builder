site:
  name: Kit-01
shared_network:
  subnet: 10.10.8.0/24
  dns_servers:
    - 10.10.8.1
    - 1.1.1.1
    - ""
    - ""
shared_snmp:
  v3_username: snmpuser
  v3_auth_protocol: SHA
  v3_auth_password: CHANGE_ME
  v3_priv_protocol: AES
  v3_priv_password: CHANGE_ME
  users:
    - username: snmpuser
      auth_protocol: SHA
      auth_password: CHANGE_ME
      priv_protocol: AES
      priv_password: CHANGE_ME
ip_plan:
  gateway: 10.10.8.1
  switch: 10.10.8.2
  esxi: 10.10.8.10
  ilo: 10.10.8.11
  windows: 10.10.8.20
  qnap: 10.10.8.30
  iosafe: 10.10.8.31
included:
  ilo: true
  esxi: true
  windows: false
  qnap: false
  iosafe: false
  cisco_switch: false
  storage: false
ilo:
  host: 10.10.8.11
  current_ip: 10.10.8.11
  target_ip: 10.10.8.11
  subnet_mask: 255.255.255.0
  gateway: 10.10.8.1
  dns_servers:
    - 10.10.8.1
    - 1.1.1.1
    - ""
    - ""
  hostname: ilo01
  username: Administrator
  password: CHANGE_ME
  additional_users:
    - username: ops-user
      password: CHANGE_ME
      role: ReadOnly
esxi:
  hostname: esxi01
  management_ip: 10.10.8.10
  subnet_mask: 255.255.255.0
  gateway: 10.10.8.1
  dns_servers:
    - 10.10.8.1
    - 1.1.1.1
  root_password: CHANGE_ME
windows:
  vm_name: win2022-01
  admin_password: CHANGE_ME
  ip_address: 10.10.8.20
  subnet_mask: 255.255.255.0
  gateway: 10.10.8.1
  dns_servers:
    - 10.10.8.1
qnap:
  hostname: qnap01
  ip: 10.10.8.30
  username: admin
  password: CHANGE_ME
iosafe:
  hostname: iosafe01
  ip: 10.10.8.31
  username: admin
  password: CHANGE_ME
cisco_switch:
  hostname: sw01
  ip: 10.10.8.2
  username: admin
  password: CHANGE_ME
  connection_method: auto
  console_port: ""
  console_baud: 9600
  domain_name: example.local
  dns_servers:
    - 10.10.8.1
  ntp_servers:
    - 10.10.8.1
    - 10.10.8.2
  management_vlan: 10
  management_ip: 10.10.8.2
  subnet_mask: 255.255.255.0
  gateway: 10.10.8.1
  bootstrap_network_port: TenGigabitEthernet1/1/1
  bootstrap_network_mode: trunk
  enable_password: ""
  vlans:
    - id: 10
      name: MANAGEMENT
      svi_enabled: true
      description: Management VLAN
    - id: 999
      name: BLACK-HOLE
      svi_enabled: false
      description: Black Hole VLAN
  port_profiles:
    client_device:
      mode: access
      access_vlan: 10
      description: Client Device
      enabled: true
      cdp: false
      lldp: true
      snmp_trap_link_status: true
      spanning_tree_portfast: true
      bpduguard: true
    unused_blackhole:
      mode: access
      access_vlan: 999
      description: UNUSED
      enabled: false
      cdp: false
      lldp: true
      snmp_trap_link_status: false
      spanning_tree_portfast: true
      bpduguard: true
    uplink_trunk:
      mode: trunk
      description: Uplink
      enabled: true
      cdp: true
      lldp: true
      snmp_trap_link_status: true
      spanning_tree_portfast: false
      bpduguard: false
      allowed_vlans: [10, 999]
  ports:
    GigabitEthernet1/0/1:
      profile: client_device
      description: Client Device
      cdp: true
      spanning_tree_portfast: false
      bpduguard: false
    GigabitEthernet1/0/2:
      profile: client_device
    GigabitEthernet1/0/3:
      profile: client_device
      description: Printer
    GigabitEthernet1/0/4:
      profile: unused_blackhole
    TenGigabitEthernet1/1/1:
      profile: uplink_trunk
      description: Uplink to Core Switch
  custom_global_commands: []
  custom_port_commands:
    GigabitEthernet1/0/3:
      after_profile:
        - storm-control broadcast level 5.00
        - storm-control multicast level 5.00
  apply_mode: initial_install
  discovery:
    prefer_console: true
    allow_network_scan: true
